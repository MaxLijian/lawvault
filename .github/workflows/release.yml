name: Release Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create_release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      upload_url: ${{ steps.create_release_step.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release_step
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-build
          name: LawVault Manual Build
          draft: true
          prerelease: true

  build-tauri:
    needs: create_release
    if: always() && (needs.create_release.result == 'success' || github.event_name == 'push')
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel 版本 (x86_64) - 使用 macos-12 (x86_64 原生)
          - platform: 'macos-12'
            args: ''
            target: ''
          # macOS Apple Silicon 版本 (aarch64)
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Rust 安装配置
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- macOS 依赖 ---
      - name: Install macOS Dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install protobuf

      # --- Linux 依赖 ---
      - name: Install Linux Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev protobuf-compiler libfuse2 file

      # --- Windows 依赖 ---
      - name: Install Protoc (Windows)
        if: matrix.platform == 'windows-latest'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and Upload Assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'manual-build' }}
          releaseName: LawVault ${{ github.ref_type == 'tag' && github.ref_name || 'Manual Build' }}
          releaseDraft: true

      # 上传 Windows 绿色版 Exe
      - name: Upload Windows Portable Exe
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: src-tauri/target/release/lawvault.exe
          asset_name: LawVault-Portable-${{ github.ref_type == 'tag' && github.ref_name || 'manual' }}-x64.exe
          asset_content_type: application/vnd.microsoft.portable-executable
